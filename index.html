<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <article class="card">
        <img
          class="card__image"
          src="./assets/images/illustration-article.svg"
          alt="Абстрактное изображение карточки"
        />
        <div class="card__body">
          <span class="card__category">Learning</span>
          <time class="card__time-published" datetime="2023-12-21"
            >Published 21 Dec 2023</time
          >
          <h2 class="card__sub-title">HTML & CSS foundations</h2>
          <p class="card__description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
          <div class="card__author">
            <img
              class="card__author-pic"
              src="./assets/images/image-avatar.webp"
              alt="Greg Hooper"
            />
            <span class="card__author-name">Greg Hooper</span>
          </div>
        </div>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
